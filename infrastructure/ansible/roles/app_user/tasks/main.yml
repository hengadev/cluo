---
# Application User Role
# Creates the application user and directory structure

- name: Create application group
  ansible.builtin.group:
    name: "{{ app_group | default(app_user | default('cluo')) }}"
    state: present
    system: true
  tags: user

- name: Create application user
  ansible.builtin.user:
    name: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ app_user | default('cluo') }}"
    create_home: true
    comment: "CLUO Application User"
  tags: user

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir | default('/opt/cluo') }}"
    state: directory
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0755"
  tags: directories

- name: Create application subdirectories
  ansible.builtin.file:
    path: "{{ app_dir | default('/opt/cluo') }}/{{ item }}"
    state: directory
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  loop:
    - data
    - data/postgres
    - data/redis
    - logs
    - backups
  tags: directories

- name: Create .env file skeleton
  ansible.builtin.copy:
    content: |
      # Application Environment Variables
      # Generated by Ansible - {{ ansible_date_time.iso8601 }}

      # Application
      APP_NAME={{ app_name | default('cluo') }}
      APP_ENV={{ app_env | default('production') }}
      APP_DEBUG=false

      # Server
      SERVER_HOST=0.0.0.0
      SERVER_PORT=8080

      # Database
      POSTGRES_HOST=postgres
      POSTGRES_PORT=5432
      POSTGRES_USER={{ postgres_user | default('cluo') }}
      POSTGRES_PASSWORD={{ postgres_password | default('CHANGE_ME') }}
      POSTGRES_DB={{ postgres_db | default('cluo') }}

      # Redis
      REDIS_HOST=redis
      REDIS_PORT=6379
      REDIS_PASSWORD={{ redis_password | default('') }}

      # AWS S3
      S3_BUCKET={{ s3_bucket | default('cluo-media') }}
      S3_REGION={{ s3_region | default('eu-central-1') }}
      AWS_ACCESS_KEY_ID={{ aws_access_key_id | default('') }}
      AWS_SECRET_ACCESS_KEY={{ aws_secret_access_key | default('') }}

      # Security
      JWT_SECRET={{ jwt_secret | default('CHANGE_ME_GENERATE_STRONG_SECRET') }}
      SESSION_SECRET={{ session_secret | default('CHANGE_ME_GENERATE_STRONG_SECRET') }}

      # Domains
      API_DOMAIN={{ api_domain | default('api.' + domain) }}
      WEB_DOMAIN={{ web_domain | default('app.' + domain) }}
      MOBILE_DOMAIN={{ mobile_domain | default('mobile.' + domain) }}

      # CORS
      CORS_ALLOWED_ORIGINS=https://{{ web_domain | default('app.' + domain) }},https://{{ mobile_domain | default('mobile.' + domain) }}

      # Features
      OLLAMA_BASE_URL=http://ollama:11434
      OLLAMA_MODEL=llama3.2
    dest: "{{ app_dir | default('/opt/cluo') }}/.env"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0640"
  tags: env

- name: Setup sudoers for app user (docker access)
  ansible.builtin.copy:
    content: |
      {{ app_user | default('cluo') }} ALL=(ALL) NOPASSWD: /usr/bin/docker, /usr/local/bin/docker-compose
    dest: /etc/sudoers.d/{{ app_user | default('cluo') }}
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  tags: sudo

- name: Create systemd override directory for app user
  ansible.builtin.file:
    path: "/home/{{ app_user | default('cluo') }}/.config/systemd/user"
    state: directory
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: systemd

- name: Enable lingering for app user (for user services)
  ansible.builtin.command: "loginctl enable-linger {{ app_user | default('cluo') }}"
  changed_when: false
  tags: systemd
