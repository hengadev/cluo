---
# Monitoring Role
# Sets up basic monitoring with cAdvisor and optional Loki

- name: Create monitoring directory
  ansible.builtin.file:
    path: "{{ app_dir | default('/opt/cluo') }}/monitoring"
    state: directory
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: monitoring

- name: Create monitoring docker-compose file
  ansible.builtin.copy:
    content: |
      services:
        cAdvisor:
          image: gcr.io/cadvisor/cadvisor:latest
          container_name: cadvisor
          restart: unless-stopped
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
          devices:
            - /dev/kmsg
          ports:
            - "8081:8080"
          privileged: true
          labels:
            - "com.cluo.monitoring=cadvisor"

        node-exporter:
          image: prom/node-exporter:latest
          container_name: node-exporter
          restart: unless-stopped
          command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--path.rootfs=/host'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
          volumes:
            - '/proc:/host/proc:ro'
            - '/sys:/host/sys:ro'
            - '/:/host:ro,rslave'
          ports:
            - "9100:9100"
          labels:
            - "com.cluo.monitoring=node-exporter"
    dest: "{{ app_dir | default('/opt/cluo') }}/monitoring/docker-compose.yml"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0640"
  tags: monitoring

- name: Start monitoring services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir | default('/opt/cluo') }}/monitoring"
  become_user: "{{ app_user | default('cluo') }}"
  register: monitoring_up
  changed_when: monitoring_up.rc == 0
  tags: monitoring

- name: Create monitoring systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=CLUO Monitoring Services
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory={{ app_dir | default('/opt/cluo') }}/monitoring
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=0
      User={{ app_user | default('cluo') }}
      Group={{ app_group | default(app_user | default('cluo')) }}

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/cluo-monitoring.service
    owner: root
    group: root
    mode: "0644"
  notify: Enable monitoring service
  tags: monitoring

- name: Setup Loki (optional)
  ansible.builtin.include_tasks: loki.yml
  when: enable_loki | default(false)
  tags: loki
