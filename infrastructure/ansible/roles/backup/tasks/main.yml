---
# Backup Role
# Sets up automated backups for PostgreSQL and application data

- name: Install backup dependencies
  ansible.builtin.apt:
    name:
      - postgresql-client
      - gzip
      - awscli
    state: present
  tags: backup

- name: Create backup directory
  ansible.builtin.file:
    path: "{{ app_dir | default('/opt/cluo') }}/backups"
    state: directory
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: backup

- name: Create backup script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      # Configuration
      BACKUP_DIR="{{ app_dir | default('/opt/cluo') }}/backups"
      APP_USER="{{ app_user | default('cluo') }}"
      POSTGRES_CONTAINER="postgres"
      POSTGRES_DB="{{ postgres_db | default('cluo') }}"
      POSTGRES_USER="{{ postgres_user | default('cluo') }}"
      RETENTION_DAYS={{ backup_retention_days | default(7) }}
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      SENTINEL_FILE="$BACKUP_DIR/.last_success"
      FAILURE_SENTINEL="$BACKUP_DIR/.last_failure"

      # Write failure sentinel on any unexpected exit
      write_failure_sentinel() {
        local exit_code=$?
        if [ "$exit_code" -ne 0 ]; then
          mkdir -p "$BACKUP_DIR"
          printf '%s\n%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "exit_code=$exit_code" > "$FAILURE_SENTINEL"
        fi
      }
      trap write_failure_sentinel EXIT

      # Colors for output
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      NC='\033[0m'

      log() {
          echo -e "${GREEN}[$(date +'%Y-%m-%d %H:%M:%S')]${NC} $1"
      }

      error() {
          echo -e "${RED}[ERROR]${NC} $1"
      }

      warn() {
          echo -e "${YELLOW}[WARN]${NC} $1"
      }

      log "Starting backup process..."

      # Create backup directory if it doesn't exist
      mkdir -p "$BACKUP_DIR"

      # PostgreSQL backup
      log "Backing up PostgreSQL database..."
      POSTGRES_BACKUP="$BACKUP_DIR/postgres_${TIMESTAMP}.sql.gz"

      if docker exec "$POSTGRES_CONTAINER" pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB" 2>/dev/null | gzip > "$POSTGRES_BACKUP"; then
          log "PostgreSQL backup completed: $POSTGRES_BACKUP"
          BACKUP_SIZE=$(du -h "$POSTGRES_BACKUP" | cut -f1)
          log "Backup size: $BACKUP_SIZE"
      else
          error "PostgreSQL backup failed"
          exit 1
      fi

      # Docker volumes backup
      log "Backing up Docker volumes..."
      VOLUMES_BACKUP="$BACKUP_DIR/volumes_${TIMESTAMP}.tar.gz"

      if docker run --rm \
          -v cluo_postgres_data:/data/postgres \
          -v cluo_redis_data:/data/redis \
          -v "$BACKUP_DIR":/backup \
          alpine:latest \
          tar czf "/backup/volumes_${TIMESTAMP}.tar.gz" -C /data . 2>/dev/null; then
          log "Docker volumes backup completed: $VOLUMES_BACKUP"
      else
          warn "Docker volumes backup failed (continuing...)"
      fi

      # Environment files backup (without sensitive data)
      log "Backing up configuration files..."
      CONFIG_BACKUP="$BACKUP_DIR/config_${TIMESTAMP}.tar.gz"

      if tar czf "$CONFIG_BACKUP" -C "{{ app_dir | default('/opt/cluo') }}" \
          docker-compose.yml \
          Caddyfile \
            2>/dev/null; then
          log "Configuration backup completed: $CONFIG_BACKUP"
      fi

      # Clean old backups
      log "Cleaning old backups (older than $RETENTION_DAYS days)..."
      find "$BACKUP_DIR" -name "postgres_*.sql.gz" -mtime +$RETENTION_DAYS -delete
      find "$BACKUP_DIR" -name "volumes_*.tar.gz" -mtime +$RETENTION_DAYS -delete
      find "$BACKUP_DIR" -name "config_*.tar.gz" -mtime +$RETENTION_DAYS -delete

      # Sync to S3 (if configured)
      if [ -n "{{ aws_access_key_id | default('') }}" ]; then
          log "Syncing backups to S3..."
          AWS_BUCKET="{{ s3_bucket | default('cluo-backups') }}"

          if aws s3 sync "$BACKUP_DIR" "s3://$AWS_BUCKET/backups/" \
              --storage-class STANDARD_IA \
              --delete \
              --exclude "*" \
              --include "postgres_*.sql.gz" \
              --include "volumes_*.tar.gz"; then
              log "S3 sync completed"
          else
              warn "S3 sync failed (local backups retained)"
          fi
      fi

      log "Backup process completed successfully"

      # Remove any stale failure sentinel on success
      rm -f "$FAILURE_SENTINEL"

      # Write success sentinel file for backup-alert check
      date -u +'%Y-%m-%dT%H:%M:%SZ' > "$SENTINEL_FILE"
      log "Sentinel file updated: $SENTINEL_FILE"

      # Send summary
      TOTAL_SIZE=$(du -sh "$BACKUP_DIR" | cut -f1)
      log "Total backup directory size: $TOTAL_SIZE"
      log "Next backup scheduled in 24 hours"
    dest: "{{ app_dir | default('/opt/cluo') }}/backup.sh"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: backup

- name: Create AWS credentials file for backups
  ansible.builtin.copy:
    content: |
      [default]
      aws_access_key_id = {{ aws_access_key_id | default('') }}
      aws_secret_access_key = {{ aws_secret_access_key | default('') }}
      region = {{ s3_region | default('eu-central-1') }}
    dest: "/home/{{ app_user | default('cluo') }}/.aws/credentials"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0600"
  when:
    - aws_access_key_id is defined
    - aws_secret_access_key is defined
  tags: backup

- name: Setup cron job for daily backups
  ansible.builtin.cron:
    name: "CLUO Daily Backup"
    user: "{{ app_user | default('cluo') }}"
    minute: "0"
    hour: "2"
    job: "{{ app_dir | default('/opt/cluo') }}/backup.sh >> {{ app_dir | default('/opt/cluo') }}/logs/backup.log 2>&1"
    cron_file: cluo-backup
  tags: backup

- name: Create restore script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      # Restore script for CLUO backups
      # Usage: ./restore.sh <backup_file>

      if [ -z "${1:-}" ]; then
          echo "Usage: $0 <backup_file>"
          echo "Available backups:"
          ls -lh {{ app_dir | default('/opt/cluo') }}/backups/
          exit 1
      fi

      BACKUP_FILE="$1"
      BACKUP_DIR="{{ app_dir | default('/opt/cluo') }}/backups"
      POSTGRES_CONTAINER="postgres"
      POSTGRES_DB="{{ postgres_db | default('cluo') }}"
      POSTGRES_USER="{{ postgres_user | default('cluo') }}"

      echo "Restoring from: $BACKUP_FILE"

      if [[ "$BACKUP_FILE" == *"postgres"* ]]; then
          echo "Restoring PostgreSQL database..."
          gunzip -c "$BACKUP_FILE" | docker exec -i "$POSTGRES_CONTAINER" psql -U "$POSTGRES_USER" "$POSTGRES_DB"
          echo "Database restored successfully"
      elif [[ "$BACKUP_FILE" == *"volumes"* ]]; then
          echo "Restoring Docker volumes..."
          echo "Warning: This will overwrite existing volumes!"
          read -p "Continue? (yes/no): " confirm
          if [ "$confirm" = "yes" ]; then
              docker run --rm \
                  -v cluo_postgres_data:/data/postgres \
                  -v cluo_redis_data:/data/redis \
                  -v "$BACKUP_DIR":/backup \
                  alpine:latest \
                  tar xzf "/backup/$(basename "$BACKUP_FILE")" -C /data
              echo "Volumes restored. Restart services with: docker compose restart"
          fi
      else
          echo "Unknown backup type"
          exit 1
      fi
    dest: "{{ app_dir | default('/opt/cluo') }}/restore.sh"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: backup

- name: Install msmtp for alert emails
  ansible.builtin.apt:
    name: msmtp
    state: present
  tags: backup

- name: Configure msmtp for alert emails
  ansible.builtin.copy:
    content: |
      account default
      host {{ smtp_host | default('smtp.gmail.com') }}
      port {{ smtp_port | default(587) }}
      from {{ smtp_from | default('noreply@' + domain) }}
      auth on
      user {{ smtp_user | default('') }}
      password {{ smtp_password | default('') }}
      tls on
      tls_starttls on
      syslog LOG_MAIL
    dest: /etc/msmtprc
    owner: root
    group: root
    mode: "0600"
  when:
    - smtp_host is defined
    - smtp_user is defined
    - smtp_password is defined
  tags: backup

- name: Create backup alert check script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      # Backup alert check — runs daily, 1 hour after the backup cron.
      # If the success sentinel is missing or stale, or a failure sentinel exists,
      # sends an alert email.

      BACKUP_DIR="{{ app_dir | default('/opt/cluo') }}/backups"
      SENTINEL_FILE="$BACKUP_DIR/.last_success"
      FAILURE_SENTINEL="$BACKUP_DIR/.last_failure"
      MAX_AGE_SECONDS=$((25 * 3600))  # 25 hours
      ALERT_EMAIL="{{ admin_email | default('root@localhost') }}"
      HOSTNAME_STR="$(hostname -f 2>/dev/null || hostname)"

      send_alert() {
        local subject="$1"
        local body="$2"
        printf "To: %s\nSubject: %s\n\n%s\n" "$ALERT_EMAIL" "$subject" "$body" | msmtp "$ALERT_EMAIL"
        echo "ALERT: $subject"
      }

      # Check for a recent failure sentinel first
      if [ -f "$FAILURE_SENTINEL" ]; then
        FAILURE_INFO=$(cat "$FAILURE_SENTINEL")
        SUBJECT="[CLUO ALERT] Backup failed on $HOSTNAME_STR"
        BODY=$(printf 'A backup failure was detected on %s.\n\nFailure sentinel: %s\nContents:\n%s\n\nThe last backup run exited with an error. Please investigate.\n\nTimestamp (UTC): %s' \
          "$HOSTNAME_STR" "$FAILURE_SENTINEL" "$FAILURE_INFO" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')")
        send_alert "$SUBJECT" "$BODY"
        exit 1
      fi

      if [ ! -f "$SENTINEL_FILE" ]; then
        SUBJECT="[CLUO ALERT] Backup sentinel missing on $HOSTNAME_STR"
        BODY=$(printf 'The backup sentinel file was not found at %s on host %s.\n\nThis means either:\n  - No backup has ever completed successfully, or\n  - The sentinel file was deleted.\n\nPlease investigate immediately.\n\nTimestamp (UTC): %s' \
          "$SENTINEL_FILE" "$HOSTNAME_STR" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')")
        send_alert "$SUBJECT" "$BODY"
        exit 1
      fi

      SENTINEL_TS=$(head -1 "$SENTINEL_FILE")
      SENTINEL_EPOCH=$(date -d "$SENTINEL_TS" +%s 2>/dev/null || echo 0)
      NOW_EPOCH=$(date +%s)
      AGE_SECONDS=$(( NOW_EPOCH - SENTINEL_EPOCH ))

      if [ "$AGE_SECONDS" -gt "$MAX_AGE_SECONDS" ]; then
        SUBJECT="[CLUO ALERT] Backup is stale on $HOSTNAME_STR"
        BODY=$(printf 'The last successful backup on %s is stale.\n\nSentinel file: %s\nLast success: %s\nAge: %d hours\nThreshold: 25 hours\n\nThe backup may have failed silently. Please investigate.\n\nTimestamp (UTC): %s' \
          "$HOSTNAME_STR" "$SENTINEL_FILE" "$SENTINEL_TS" "$(( AGE_SECONDS / 3600 ))" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')")
        send_alert "$SUBJECT" "$BODY"
        exit 1
      fi

      # Sentinel is fresh — exit silently
      exit 0
    dest: "{{ app_dir | default('/opt/cluo') }}/check-backup.sh"
    owner: "{{ app_user | default('cluo') }}"
    group: "{{ app_group | default(app_user | default('cluo')) }}"
    mode: "0750"
  tags: backup

- name: Setup cron job for backup alert check
  ansible.builtin.cron:
    name: "CLUO Backup Alert Check"
    user: "{{ app_user | default('cluo') }}"
    minute: "0"
    hour: "3"
    job: "{{ app_dir | default('/opt/cluo') }}/check-backup.sh >> {{ app_dir | default('/opt/cluo') }}/logs/backup-alert.log 2>&1"
    cron_file: cluo-backup-alert
  tags: backup

- name: Create backup alert log rotation
  ansible.builtin.copy:
    content: |
      {{ app_dir | default('/opt/cluo') }}/logs/backup-alert.log {
          weekly
          rotate 8
          compress
          delaycompress
          missingok
          notifempty
          create 0640 {{ app_user | default('cluo') }} {{ app_group | default(app_user | default('cluo')) }}
      }
    dest: /etc/logrotate.d/cluo-backup-alert
    owner: root
    group: root
    mode: "0644"
  tags: backup

- name: Create backup log rotation
  ansible.builtin.copy:
    content: |
      {{ app_dir | default('/opt/cluo') }}/logs/backup.log {
          weekly
          rotate 8
          compress
          delaycompress
          missingok
          notifempty
          create 0640 {{ app_user | default('cluo') }} {{ app_group | default(app_user | default('cluo')) }}
      }
    dest: /etc/logrotate.d/cluo-backup
    owner: root
    group: root
    mode: "0644"
  tags: backup
