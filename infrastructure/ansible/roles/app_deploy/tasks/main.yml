---
# Application Deployment Role
# Mirrors the real Cluo deployment steps (ported from homelab/ansible/deploy.yml):
# production and staging each get their own compose project; staging shares
# production's Postgres container with a separate role/database.

# -----------------------------------------------------------------------------
# Production
# -----------------------------------------------------------------------------

- name: Create /opt/cluo directory
  ansible.builtin.file:
    path: /opt/cluo
    state: directory
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0750"
  tags: deploy

- name: Create cluo data/vault directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0750"
  loop:
    - /opt/cluo/data/minio
    - /opt/cluo/vault/config
  tags: deploy

- name: Template vault.hcl for cluo
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: /opt/cluo/vault/config/vault.hcl
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0640"
  tags: deploy

- name: Copy production docker-compose for cluo
  ansible.builtin.copy:
    src: prod.docker-compose.yml
    dest: /opt/cluo/docker-compose.yml
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0644"
  tags: deploy

- name: Template production .env for cluo
  ansible.builtin.template:
    src: cluo-prod.env.j2
    dest: /opt/cluo/.env
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0600"
  tags: env

- name: Pull cluo production images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: /opt/cluo
  changed_when: true
  tags: deploy

- name: Start cluo production services
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: /opt/cluo
  changed_when: true
  tags: deploy

- name: Wait for production postgres to be ready
  ansible.builtin.command:
    cmd: docker exec cluo-prod-postgres pg_isready -U {{ cluo_prod_db_user }}
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 10
  delay: 3
  changed_when: false
  tags: deploy

- name: Wait for ollama to be ready (model pull can take a while on first run)
  ansible.builtin.command:
    cmd: docker exec cluo-prod-ollama ollama list
  register: ollama_ready
  until: ollama_ready.rc == 0
  retries: 20
  delay: 5
  changed_when: false
  when: cluo_ai_ollama_enabled | default(true)
  tags: deploy

# -----------------------------------------------------------------------------
# Staging (shares production's Postgres container, separate role + database)
# -----------------------------------------------------------------------------

- name: Create /opt/cluo-staging directory
  ansible.builtin.file:
    path: /opt/cluo-staging
    state: directory
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0750"
  tags: deploy

- name: Copy staging docker-compose for cluo
  ansible.builtin.copy:
    src: staging.docker-compose.yml
    dest: /opt/cluo-staging/docker-compose.yml
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0644"
  tags: deploy

- name: Copy cluo backup script
  ansible.builtin.copy:
    src: backup.sh
    dest: /opt/cluo-staging/backup.sh
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0755"
  tags: deploy

- name: Template staging .env for cluo
  ansible.builtin.template:
    src: cluo-staging.env.j2
    dest: /opt/cluo-staging/.env
    owner: "{{ app_user | default('deploy') }}"
    group: "{{ app_group | default(app_user | default('deploy')) }}"
    mode: "0600"
  tags: env

- name: Create staging database user on production postgres
  ansible.builtin.command:
    cmd: >
      docker exec cluo-prod-postgres psql -U {{ cluo_prod_db_user }} -d postgres -c
      "DO $$ BEGIN
         IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ cluo_staging_db_user }}') THEN
           CREATE ROLE {{ cluo_staging_db_user }} WITH LOGIN;
         END IF;
         ALTER ROLE {{ cluo_staging_db_user }} WITH LOGIN PASSWORD '{{ cluo_staging_db_password }}';
       END $$;"
  changed_when: true
  no_log: true
  tags: deploy

- name: Create staging database on production postgres
  ansible.builtin.command:
    cmd: docker exec cluo-prod-postgres psql -U {{ cluo_prod_db_user }} -d postgres -c "CREATE DATABASE {{ cluo_staging_db_name }} OWNER {{ cluo_staging_db_user }};"
  register: create_staging_db
  failed_when: create_staging_db.rc != 0 and 'already exists' not in create_staging_db.stderr
  changed_when: create_staging_db.rc == 0
  no_log: true
  tags: deploy

- name: Pull cluo staging images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: /opt/cluo-staging
  changed_when: true
  tags: deploy

- name: Start cluo staging services
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: /opt/cluo-staging
  changed_when: true
  tags: deploy

- name: Wait for cluo staging API to be running
  ansible.builtin.command:
    cmd: docker inspect --format='{{ '{{' }}.State.Status{{ '}}' }}' cluo-staging-api
  register: staging_api_status
  until: staging_api_status.stdout == "running"
  retries: 10
  delay: 5
  changed_when: false
  tags: deploy

- name: Display running containers
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: /opt/cluo
  register: docker_ps
  changed_when: false
  tags: deploy

- name: Display container status
  ansible.builtin.debug:
    var: docker_ps.stdout_lines
  tags: deploy
