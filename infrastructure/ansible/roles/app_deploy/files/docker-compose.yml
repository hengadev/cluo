services:
  # Infrastructure
  postgres:
    image: postgres:16-alpine
    container_name: cluo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cluo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cluo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cluo-network

  redis:
    image: redis:7-alpine
    container_name: cluo-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cluo-network

  # Application Services
  api:
    image: hengadev/cluo-api:${APP_VERSION:-latest}
    container_name: cluo-api
    environment:
      CLUO_ENVIRONMENT: production
      CLUO_SERVER_HOST: 0.0.0.0
      CLUO_SERVER_PORT: 8080
      CLUO_DB_HOST: postgres
      CLUO_DB_PORT: 5432
      CLUO_DB_NAME: ${POSTGRES_DB:-cluo}
      CLUO_DB_USER: ${POSTGRES_USER:-cluo}
      CLUO_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLUO_DB_SSL_MODE: disable
      CLUO_REDIS_HOST: redis
      CLUO_REDIS_PORT: 6379
      CLUO_LOG_LEVEL: info
      CLUO_LOG_STYLE: json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cluo-network

  mobile:
    image: hengadev/cluo-mobile:${APP_VERSION:-latest}
    container_name: cluo-mobile
    environment:
      PUBLIC_API_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - cluo-network

  web:
    image: hengadev/cluo-web:${APP_VERSION:-latest}
    container_name: cluo-web
    environment:
      PUBLIC_API_URL: http://api:8080
    ports:
      - "3001:3000"
    depends_on:
      - api
    networks:
      - cluo-network

networks:
  cluo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
