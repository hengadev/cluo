services:
  caddy:
    image: serfriz/caddy-cloudflare:latest
    container_name: cluo-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ${CADDY_DATA_DIR}/config:/etc/caddy:ro
      - ${CADDY_DATA_DIR}/data:/data
      - ${CADDY_DATA_DIR}/logs:/var/log/caddy
    networks:
      - proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cluo-prod-postgres:
    image: postgres:16-alpine
    container_name: cluo-prod-postgres
    environment:
      POSTGRES_USER: ${CLUO_DB_USER}
      POSTGRES_PASSWORD: ${CLUO_DB_PASSWORD}
      POSTGRES_DB: ${CLUO_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLUO_DB_USER:-cluo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cluo-prod-internal

  cluo-prod-redis:
    image: redis:7-alpine
    container_name: cluo-prod-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cluo-prod-internal

  cluo-prod-api:
    image: ${CLUO_REGISTRY}/cluo-api:${CLUO_PROD_TAG:-latest}
    container_name: cluo-prod-api
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      cluo-prod-postgres:
        condition: service_healthy
      cluo-prod-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-prod-web:
    image: ${CLUO_REGISTRY}/cluo-web:${CLUO_PROD_TAG:-latest}
    container_name: cluo-prod-web
    env_file: .env
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - cluo-prod-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-prod-mobile:
    image: ${CLUO_REGISTRY}/cluo-mobile:${CLUO_PROD_TAG:-latest}
    container_name: cluo-prod-mobile
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - cluo-prod-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  # Shared by both prod and staging cluo-api (staging joins this network and
  # points CLUO_AI_OLLAMA_BASE_URL at this same container) — one instance to
  # fit the AI stack's memory footprint on a single 8GB VPS.
  cluo-prod-ollama:
    image: ollama/ollama:latest
    container_name: cluo-prod-ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cluo-prod-internal

  # One-shot: pulls the configured model on startup, then exits.
  cluo-prod-ollama-pull:
    image: ollama/ollama:latest
    container_name: cluo-prod-ollama-pull
    depends_on:
      cluo-prod-ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: cluo-prod-ollama:11434
    entrypoint: ["ollama", "pull", "${CLUO_AI_OLLAMA_MODEL:-llama3.2}"]
    restart: "no"
    networks:
      - cluo-prod-internal

networks:
  cluo-prod-internal:
    driver: bridge
    name: cluo-prod-internal
  # Owned here (not external) — prod is what creates it on the dedicated
  # VPS; staging joins it as external: true.
  proxy:
    driver: bridge
    name: proxy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
