---
# Docker Role
# Installs Docker and Docker Compose

- name: Check if Docker is already installed
  ansible.builtin.command: docker --version
  register: docker_check
  failed_when: false
  changed_when: false
  tags: docker

- name: Remove old Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  when: docker_check.rc != 0
  tags: docker

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  tags: docker

- name: Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: docker

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present
  tags: docker

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  tags: docker

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  tags: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  tags: docker

- name: Ensure Docker daemon is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  tags: docker

- name: Add app user to docker group
  ansible.builtin.user:
    name: "{{ app_user | default('cluo') }}"
    groups: docker
    append: true
  when: app_user is defined
  tags: docker

- name: Configure Docker daemon
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true,
        "default-ulimits": {
          "nofile": {
            "Name": "nofile",
            "Hard": 64000,
            "Soft": 64000
          }
        },
        "icc": false,
        "userland-proxy": false,
        "no-new-privileges": true
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Docker
  tags: docker

- name: Create Docker logrotate config
  ansible.builtin.copy:
    content: |
      /var/lib/docker/containers/*/*.log {
          rotate 7
          daily
          compress
          missingok
          delaycompress
          copytruncate
      }
    dest: /etc/logrotate.d/docker
    owner: root
    group: root
    mode: "0644"
  tags: docker

- name: Verify Docker installation
  ansible.builtin.command: docker run --rm hello-world
  register: docker_verify
  changed_when: false
  failed_when: docker_verify.rc != 0
  tags: docker

- name: Display Docker version
  ansible.builtin.debug:
    msg: "{{ docker_check.stdout }}"
  tags: docker
