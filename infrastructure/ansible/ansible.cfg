[defaults]
# Inventory file
inventory = inventory.yml

# Role path
roles_path = roles

# Disable host key checking (use with caution, better to use ssh_known_hosts)
host_key_checking = False

# SSH timeout
timeout = 30

# Number of parallel processes
forks = 5

# Display skipped tasks
display_skipped_hosts = True

# Display task tags
display_args_to_stdout = False

# Fact caching
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 86400

# Privilege escalation
become = True
become_method = sudo
become_ask_pass = False

# SSH settings
[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
ssh_args = -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=60s
