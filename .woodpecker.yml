when:
  - event: tag
    ref: refs/tags/v*

steps:
  - name: build-windows
    image: golang:1.23-bookworm
    environment:
      UPDATE_PUBLIC_KEY:
        from_secret: UPDATE_PUBLIC_KEY
    commands:
      - apt-get update -qq
      - apt-get install -y -qq gcc-mingw-w64-x86-64 curl
      - curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y -qq nodejs
      - npm install -g pnpm
      - go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
      - cd cluo_desktop
      - LDFLAGS="-X cluo_desktop/updater.Version=$VERSION -X cluo_desktop/updater.ManifestURL=https://releases.henga.dev/cluo/manifest.json -X cluo_desktop/updater.PublicKey=$UPDATE_PUBLIC_KEY"
      - cd frontend && pnpm install && pnpm run build && cd ..
      - wails generate module
      - wails build -platform windows/amd64 -skipbindings -s -ldflags "$LDFLAGS"

  - name: sign-and-publish
    image: golang:1.23-bookworm
    environment:
      UPDATE_PRIVATE_KEY:
        from_secret: UPDATE_PRIVATE_KEY
    commands:
      - cd cluo_desktop
      - go build -o /tmp/sign-manifest ./cmd/sign-manifest
      - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
      - EXE=build/bin/cluo_desktop.exe
      - CHECKSUM=$(sha256sum "$EXE" | awk '{print $1}')
      - FILENAME=cluo_desktop_${CI_COMMIT_TAG}_windows_amd64.exe
      - DL_URL=https://releases.henga.dev/cluo/$FILENAME
      - printf '{"version":"%s","release_notes":"","downloads":{"windows_amd64":"%s"},"checksums":{"windows_amd64":"%s"}}' "$VERSION" "$DL_URL" "$CHECKSUM" > /tmp/manifest.json
      - printf '%s' "$UPDATE_PRIVATE_KEY" > /tmp/privkey
      - /tmp/sign-manifest sign /tmp/manifest.json /tmp/privkey
      - rm /tmp/privkey
      - mkdir -p /opt/releases/cluo
      - cp "$EXE" /opt/releases/cluo/"$FILENAME"
      - cp /tmp/manifest.json /opt/releases/cluo/manifest.json
